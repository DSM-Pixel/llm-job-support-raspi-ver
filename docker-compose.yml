services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-job-support-app
    ports:
      - "80:80"
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONIOENCODING: "utf-8"
      REDIS_URL: "redis://redis:6379/0"
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env
      - ./backend:/app/backend
      - ./web:/app/web
      - ./data:/app/data
    depends_on:
      - redis
    restart: unless-stopped
    mem_limit: "512m"
    memswap_limit: "1g"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: llm-job-support-redis
    # 캐시 전용 — 영속 불필요. 메모리 상한 + LRU 로 폭주 방지.
    command:
      - "redis-server"
      - "--save"
      - ""
      - "--appendonly"
      - "no"
      - "--maxmemory"
      - "64mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    restart: unless-stopped
    mem_limit: "128m"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  default:
    name: llm-job-support-net
    driver: bridge
