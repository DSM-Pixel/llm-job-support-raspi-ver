services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-job-support-app
    ports:
      - "80:80"
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONIOENCODING: "utf-8"
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env
      - ./backend:/app/backend
      - ./web:/app/web
      - ./data:/app/data
    restart: unless-stopped
    mem_limit: "512m"
    memswap_limit: "1g"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  default:
    name: llm-job-support-net
    driver: bridge

